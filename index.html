        window.__sdkSignaled = true;
        try { ytgame.game.firstFrameReady(); } catch(e){}
        setTimeout(function() {
          try { ytgame.game.gameReady(); } catch(e){}
        }, 100);
      }
    };

      if (!window.__sdkSignaled && typeof ytgame !== 'undefined') {
        window.__sdkSignaled = true;
        try { ytgame.game.firstFrameReady(); } catch(e2){}
        setTimeout(function() {
          try { ytgame.game.gameReady(); } catch(e2){}
        }, 100);
      }
    });

            top: 0;
            left: 0;

            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;

            -webkit-backdrop-filter: blur(8px);

            50% { opacity: 1; }

        @keyframes btn-shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-3px) rotate(-1deg); }
            30% { transform: translateX(3px) rotate(1deg); }
            45% { transform: translateX(-2px) rotate(-0.5deg); }
            60% { transform: translateX(2px) rotate(0.5deg); }

        .btn-3d {
            display: flex;

            position: relative;
            transition: transform 0.1s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;

        .btn-3d::after {
            content: '';

            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            border-radius: 16px;
            z-index: -1;

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 30;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #loading-screen.show {
            display: flex;
            opacity: 1;
        }
        .loading-logo {
            width: clamp(90px, 28vmin, 140px);
            height: auto;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.1));
        }
        .loading-spinner {
            width: clamp(24px, 7vmin, 36px);
            height: clamp(24px, 7vmin, 36px);
            border: 4px solid #eee;
            border-top-color: #FF9F43;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Splash Screen (first load) ── */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        #splash-screen.fade-out {
            opacity: 0;
        }
        .splash-img {
            width: clamp(180px, 50vmin, 300px);
            height: auto;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.08));
        }

        /* ── Sub promo image on menu ── */
        .menu-sub {
            width: min(clamp(120px, 36vmin, 200px), 18vh);
            height: auto;
            pointer-events: none;
        }

        /* ── Coin icon (inline) ── */
        .coin-icon {
            width: clamp(22px, 6vmin, 36px);
            height: clamp(22px, 6vmin, 36px);
            vertical-align: middle;
            margin-right: 4px;
            margin-top: -3px;
        }
        .coin-icon-sm {
            width: clamp(18px, 5vmin, 28px);
            height: clamp(18px, 5vmin, 28px);
            vertical-align: middle;
            margin-right: 3px;
            margin-top: -2px;
        }
        .coin-icon-lg {
            width: clamp(28px, 8vmin, 48px);
            height: clamp(28px, 8vmin, 48px);
            vertical-align: middle;
            margin-right: 5px;
            margin-top: -4px;
        }

        /* Admin panel removed for production */

        /* ── Short landscape (YouTube Playables ~270px, small tablets etc.) ── */
        @media (max-height: 420px) {
            .menu-sub { display: none !important; }

            .menu-top { top: 1vh; }

            .menu-logo { width: min(clamp(100px, 35vmin, 180px), 22vh); }

            .menu-bottom { gap: 0.5vh; bottom: 1vh; }

            #menu-best { margin-bottom: 1vh !important; font-size: clamp(7px, 2vmin, 10px); }

            .btn-3d { font-size: clamp(10px, 3vmin, 16px); }

            .btn-3d.btn-small { height: min(clamp(28px, 8vmin, 42px), 9vh); }

            .btn-3d.btn-tiny { height: min(clamp(20px, 5.5vmin, 28px), 7vh); }

            .btn-icon { width: clamp(14px, 4vmin, 22px); height: clamp(14px, 4vmin, 22px); }

            .btn-icon-sm { width: clamp(10px, 3vmin, 16px); height: clamp(10px, 3vmin, 16px); }

            .menu-coins { font-size: clamp(10px, 3vmin, 16px); }
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="splash.png" alt="UK4DEE GAMES" class="splash-img">
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay"></div>

    <!-- Main Menu -->
    <div id="menu-screen">
        <div class="menu-coins" id="menu-coins"></div>
        <div class="menu-wrapper">
            <div class="menu-top">
                <img src="Logo.png" alt="Flow" class="menu-logo">
            </div>

        </div>
        <div class="menu-bottom" id="menu-tap-zone">
            <button class="btn-3d btn-green btn-small" id="btn-play-level" style="width:100%; max-width:clamp(112px, 29vmin, 168px);">PLAY</button>
            <div class="menu-best" id="menu-best" style="margin-bottom:3vh;"></div>
            <div class="btn-row">
                <button class="btn-3d btn-orange btn-small" id="btn-store"><img src="shopping-cart.png" class="btn-icon" alt="Store"></button>
                <button class="btn-3d btn-pink btn-small" id="btn-objectives"><img src="target.png" class="btn-icon" alt="Objectives"></button>
            </div>
            <button class="btn-3d btn-purple btn-tiny" id="btn-theme"><img src="moon.png" class="btn-icon" alt="Theme" id="theme-icon"></button>
            <img src="Sub.png" alt="" class="menu-sub">
        </div>
    </div>

    <!-- Store Overlay -->
    <div id="store-screen">
        <div class="store-card">
            <h2>STORE</h2>
            <div class="store-coins" id="store-coins"></div>
            <div class="store-list" id="store-list"></div>
            <button class="btn-3d btn-red btn-small store-close" id="store-close">CLOSE</button>
        </div>
    </div>

    <!-- Objectives Overlay -->
    <div id="objectives-screen">
        <canvas id="coin-shower-canvas" class="shower-canvas"></canvas>
        <div class="store-card">
            <h2>OBJECTIVES</h2>
            <div class="obj-completion" id="obj-completion"></div>
            <div class="objectives-list" id="objectives-list"></div>
            <button class="btn-3d btn-green btn-small" id="objectives-collect-all" style="display:none; margin-bottom: 8px;">COLLECT ALL</button>
            <button class="btn-3d btn-red btn-small store-close" id="objectives-close">CLOSE</button>
        </div>
    </div>

    <!-- Level Complete -->
    <div id="game-over-screen">
        <canvas id="confetti-canvas" class="shower-canvas"></canvas>
        <div class="store-card gameover-card">
            <h2>COMPLETE!</h2>
            <div class="end-score" id="end-score"></div>
            <div class="end-label" style="display:none;">SCORE</div>
            <div class="end-best" id="end-best"></div>
            <div class="new-best" id="new-best-label">PERFECT!</div>
            <div class="end-coins" id="end-coins">+0 COINS</div>
            <div class="btn-row" style="margin-top: 8px;">
                <button class="btn-3d btn-yellow btn-small" id="restart-btn">LEVELS</button>
                <button class="btn-3d btn-green btn-small" id="next-level-btn">NEXT</button>
            </div>
        </div>
    </div>

    <!-- Pause Screen (in-game menu) -->
    <div id="pause-screen">
        <div class="store-card" style="padding-top: clamp(20px, 6vmin, 36px); padding-bottom: clamp(20px, 6vmin, 36px);">
            <h2>PAUSED</h2>
            <div class="btn-row" style="margin-bottom: 10px;">
                <button class="btn-3d btn-green btn-small" id="pause-resume-btn">RESUME</button>
            </div>
            <div class="btn-row" style="margin-bottom: 10px;">
                <button class="btn-3d btn-orange btn-small" id="pause-restart-btn">RESTART</button>
            </div>
            <div class="btn-row">
                <button class="btn-3d btn-red btn-small" id="pause-menu-btn">MENU</button>
            </div>
        </div>
    </div>

    <!-- YouTube SDK Pause Overlay -->
    <div id="yt-pause-overlay">
        <div class="pause-text">PAUSED</div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <img src="Logo.png" alt="Flow" class="loading-logo">
        <div class="loading-spinner"></div>
    </div>

    <!-- Admin panel removed for production -->

    <script src="game.js" nonce="ItXjHmsnnkZQj8m6RJravQ"></script>
</body>
</html>
